name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts
        # better-sqlite3 native rebuild is not needed for typecheck/lint and
        # keeps CI fast. The postinstall script runs for real builds only.

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

  # Smoke test del empaquetado: corre electron-builder en modo --dir (sin
  # generar instalador) para detectar problemas de config sin firmar ni
  # subir artefactos. Solo Windows porque es el target principal.
  pack:
    name: Pack smoke test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Pack (no installer)
        run: npm run pack
