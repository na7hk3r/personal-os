name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts
        # better-sqlite3 native rebuild is not needed for typecheck/lint and
        # keeps CI fast. The postinstall script runs for real builds only.

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present
